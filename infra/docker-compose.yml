version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: infra/backend/Dockerfile
    container_name: unified-platform-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ../config/.env
    volumes:
      - ../backend/models:/app/backend/models
      - ../backend/logs:/app/backend/logs
      - ../backend/datasets:/app/backend/datasets
      - ../backend/config:/app/backend/config
      - ../backend/app.db:/app/backend/app.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin-ui:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: unified-platform-ui
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - default

networks:
  default:
    name: unified-platform-net
