<!doctype html>
<html lang="en">
  <body>
    <section aria-label="Checkout Contact">
      <h2>Checkout Contact</h2>
      <div class="grid">
        <div>
          <label>Contact Name</label>
          <input type="text" autocomplete="name" />
        </div>
        <div>
          <label>Contact Email</label>
          <input type="text" aria-label="Email address" />
        </div>
        <div>
          <label>Phone</label>
          <input type="tel" pattern="[0-9]{10}" />
        </div>
      </div>
    </section>
  </body>
</html>
