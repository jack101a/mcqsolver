<!doctype html>
<html lang="en">
  <body>
    <form id="job-apply-form">
      <fieldset>
        <legend>Applicant Information</legend>
        <label for="fullName">Full Name</label>
        <input id="fullName" name="candidate_name" type="text" />
      </fieldset>
      <fieldset>
        <label>Email Address</label>
        <input name="candidate_email" type="email" placeholder="name@example.com" />
      </fieldset>
      <div class="row">
        <span>Mobile Number</span>
        <input name="candidate_phone" type="tel" />
      </div>
      <button type="submit">Apply</button>
    </form>
  </body>
</html>
