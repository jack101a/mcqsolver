<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autofill Admin Console</title>
    <style>
      :root {
        --bg: #f3f6fa;
        --card: #ffffff;
        --line: #d8e1ec;
        --text: #1e293b;
        --muted: #5b6b80;
        --primary: #0f5cc0;
        --primary-soft: #e9f1ff;
        --danger: #b42318;
        --ok: #067647;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(circle at top right, #e7f0ff, #f7f9fc 42%, #f3f6fa 100%);
        color: var(--text);
      }
      .wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 18px;
      }
      .topbar {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 10px;
        align-items: end;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field label {
        font-size: 12px;
        color: var(--muted);
      }
      input, select, button, textarea {
        font-family: inherit;
        font-size: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px 10px;
      }
      input:focus, select:focus, textarea:focus {
        outline: 2px solid #cfe0ff;
        border-color: #87aef3;
      }
      button {
        cursor: pointer;
        background: var(--primary);
        color: #fff;
        border: none;
        font-weight: 600;
      }
      button.secondary {
        background: var(--primary-soft);
        color: var(--primary);
        border: 1px solid #c8d9f8;
      }
      button.danger {
        background: #fee4e2;
        color: var(--danger);
        border: 1px solid #fecdc9;
      }
      .grid {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 14px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
      }
      .panel h2 {
        margin: 0 0 10px 0;
        font-size: 16px;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }
      .metric {
        background: #f8fbff;
        border: 1px solid #dbe7fb;
        border-radius: 10px;
        padding: 10px;
      }
      .metric .k { font-size: 11px; color: var(--muted); }
      .metric .v { font-size: 21px; font-weight: 700; margin-top: 4px; }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }
      .row.wrap {
        flex-wrap: wrap;
        padding: 0;
        margin: 0 0 10px 0;
      }
      .status {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
      }
      .status.ok { color: var(--ok); }
      .status.err { color: var(--danger); }
      .list {
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th, td {
        text-align: left;
        padding: 8px 10px;
        border-bottom: 1px solid #edf2f8;
        vertical-align: top;
      }
      th {
        background: #f8fbff;
        color: #324357;
        font-size: 12px;
      }
      td code {
        font-size: 12px;
        background: #f1f5fb;
        border: 1px solid #e1e9f5;
        border-radius: 6px;
        padding: 1px 5px;
      }
      .output {
        width: 100%;
        min-height: 170px;
        resize: vertical;
        background: #0d1b2a;
        color: #dbebff;
        border: 1px solid #20344d;
      }
      .pill {
        display: inline-block;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
      }
      .pill.open { background: #ffede8; color: #b42318; }
      .pill.acknowledged { background: #ecfdf3; color: #067647; }
      @media (max-width: 1100px) {
        .grid { grid-template-columns: 1fr; }
        .cards { grid-template-columns: repeat(3, 1fr); }
      }
      @media (max-width: 760px) {
        .topbar { grid-template-columns: 1fr; }
        .cards { grid-template-columns: repeat(2, 1fr); }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="field">
          <label for="apiBase">API Base URL</label>
          <input id="apiBase" placeholder="http://127.0.0.1:4000" />
        </div>
        <div class="field">
          <label for="accessToken">Enterprise Access Token</label>
          <input id="accessToken" placeholder="Paste access token" />
        </div>
        <button id="saveSession" class="secondary">Save Session</button>
      </div>

      <div class="grid">
        <section class="panel">
          <h2>Platform Stats</h2>
          <div class="row">
            <button id="loadStats">Refresh Stats</button>
          </div>
          <div class="cards">
            <div class="metric"><div class="k">Users</div><div class="v" id="mUsers">-</div></div>
            <div class="metric"><div class="k">Workflows</div><div class="v" id="mWorkflows">-</div></div>
            <div class="metric"><div class="k">Profiles</div><div class="v" id="mProfiles">-</div></div>
            <div class="metric"><div class="k">Runs</div><div class="v" id="mRuns">-</div></div>
            <div class="metric"><div class="k">Audits</div><div class="v" id="mAudits">-</div></div>
          </div>
          <div class="status" id="statsStatus">Idle</div>
        </section>

        <section class="panel">
          <h2>Incident Insights</h2>
          <div class="row wrap">
            <label for="windowMinutes">Window (min)</label>
            <input id="windowMinutes" type="number" value="60" min="5" max="1440" style="width:120px" />
            <button id="loadInsights">Load Insights</button>
          </div>
          <div class="list">
            <table>
              <thead>
                <tr><th>Type</th><th>Count</th></tr>
              </thead>
              <tbody id="insightTypeRows"></tbody>
            </table>
          </div>
          <div class="status" id="insightStatus">Idle</div>
        </section>
      </div>

      <div class="grid">
        <section class="panel">
          <h2>Alerts</h2>
          <div class="row wrap">
            <label for="alertStatus">Status</label>
            <select id="alertStatus">
              <option value="">All</option>
              <option value="open">Open</option>
              <option value="acknowledged">Acknowledged</option>
            </select>
            <label for="alertType">Type</label>
            <select id="alertType">
              <option value="">All</option>
              <option value="rate_limit_spike">Rate Limit Spike</option>
              <option value="execution_failure">Execution Failure</option>
              <option value="execution_degraded">Execution Degraded</option>
            </select>
            <button id="loadAlerts">Load Alerts</button>
          </div>
          <div class="list">
            <table>
              <thead>
                <tr><th>Status</th><th>Type</th><th>Source</th><th>Created</th><th>Action</th></tr>
              </thead>
              <tbody id="alertRows"></tbody>
            </table>
          </div>
          <div class="status" id="alertStatusText">Idle</div>
        </section>

        <section class="panel">
          <h2>Audit Trail</h2>
          <div class="row wrap">
            <label for="auditActor">Actor</label>
            <input id="auditActor" placeholder="user / execution_worker / billing_webhook" />
            <label for="auditAction">Action</label>
            <input id="auditAction" placeholder="workflow.create, execution.run..." />
            <button id="loadAudit">Load Audit</button>
          </div>
          <div class="list">
            <table>
              <thead>
                <tr><th>Actor</th><th>Action</th><th>User</th><th>Time</th></tr>
              </thead>
              <tbody id="auditRows"></tbody>
            </table>
          </div>
          <div class="status" id="auditStatusText">Idle</div>
        </section>
      </div>

      <section class="panel" style="margin-top:14px;">
        <h2>Raw Response Viewer</h2>
        <textarea id="rawOutput" class="output" spellcheck="false"></textarea>
      </section>
    </div>
    <script src="main.js"></script>
  </body>
</html>
