services: 
  # ==========================================
  # TATA CAPTCHA API
  # ==========================================
  api:
    image: ghcr.io/jack101a/ai-task-api:${CAPTCHA_IMAGE_TAG:-latest}
    container_name: tata_captcha_api
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    environment:
      - TZ=${TZ}
      - CONFIG_PATH=/app/backend/config/config.yaml
      - SQLITE_PATH=/app/backend/logs/app.db
      - DEBUG=${CAPTCHA_DEBUG:-false}
      - ADMIN_TRUST_PROXY_IDENTITY=${CAPTCHA_ADMIN_TRUST_PROXY_IDENTITY:-true}
      - ADMIN_USERNAME=${CAPTCHA_ADMIN_USERNAME}
      - ADMIN_PASSWORD=${CAPTCHA_ADMIN_PASSWORD}
      - AUTH_HASH_SALT=${CAPTCHA_AUTH_HASH_SALT}
    ports:
      - "8085:8080"
    volumes:
      - ${CONFIG_PATH}/tata_captcha/logs:/app/backend/logs
      - ${CONFIG_PATH}/tata_captcha/config:/app/backend/config
      - ${CONFIG_PATH}/tata_captcha/models:/app/backend/models
      - ${CONFIG_PATH}/tata_captcha/datasets:/app/backend/datasets
    networks:
      ajax_network:
        ipv4_address: 172.60.0.62




networks:
  ajax_network:
    external: true
    
