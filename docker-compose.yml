x-sa-helper-image: &sa-helper-image ${SA_HELPER_IMAGE:-ghcr.io/jack101a/sa-helper:docker-32}

x-sa-helper-env: &sa-helper-env
  APP_ENV: ${APP_ENV:-production}
  DEBUG: ${DEBUG:-true}
  PORT: "8080"
  AUTH_HASH_SALT: ${AUTH_HASH_SALT:-test12345678}
  ADMIN_TOKEN: ${ADMIN_TOKEN:-admin123}
  ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-123456}
  LITELLM_ENDPOINT: ${LITELLM_ENDPOINT:-}
  LITELLM_API_KEY: ${LITELLM_API_KEY:-}
  QUEUE_WORKERS: ${QUEUE_WORKERS:-4}
  EXAM_OCR_CONCURRENCY: ${EXAM_OCR_CONCURRENCY:-2}
  CALLMEBOT_PHONE: ${CALLMEBOT_PHONE:-}
  CALLMEBOT_APIKEY: ${CALLMEBOT_APIKEY:-}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-}
  TELEGRAM_BOT_WAIT_FOR_TOKEN: ${TELEGRAM_BOT_WAIT_FOR_TOKEN:-true}
  REDIS_ENABLED: ${REDIS_ENABLED:-true}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  DB_TYPE: ${DB_TYPE:-postgresql}
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://sa_helper:sa_helper@postgres:5432/sa_helper}
  SQLITE_PATH: /app/backend/logs/app.db
  CONFIG_PATH: /app/backend/config/config.yaml
  ONNX_PATH: /app/data/models/model.onnx
  SEED_BUNDLE_ON_START: ${SEED_BUNDLE_ON_START:-true}
  SEED_IMPORT_MODE: ${SEED_IMPORT_MODE:-if-empty}
  SEED_BUNDLE_PATH: ${SEED_BUNDLE_PATH:-/app/import/sa-helper-seed.zip}

x-sa-helper-volumes: &sa-helper-volumes
  - ${CONFIG_PATH:-/srv/ajaxhs/config}/sa_helper/logs:/app/backend/logs
  - ${CONFIG_PATH:-/srv/ajaxhs/config}/sa_helper/data:/app/data
  - ${CONFIG_PATH:-/srv/ajaxhs/config}/sa_helper/config:/app/backend/config
  - ${CONFIG_PATH:-/srv/ajaxhs/config}/sa_helper/import:/app/import

x-sa-helper-base: &sa-helper-base
  image: *sa-helper-image
  restart: unless-stopped
  init: true
  environment: *sa-helper-env
  volumes: *sa-helper-volumes
  networks:
    - ajax_network

services:
  api:
    <<: *sa-helper-base
    container_name: sa-helper
    stop_grace_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      ajax_network:
        ipv4_address: 172.60.0.63

  worker:
    <<: *sa-helper-base
    container_name: sa-helper-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - celery
      - -A
      - app.workers.celery_app.celery_app
      - worker
      - --loglevel=INFO
      - --concurrency=${WORKER_CONCURRENCY:-2}
      - -Q
      - solve-heavy,feedback,maintenance,default

  telegram-bot:
    <<: *sa-helper-base
    container_name: sa-helper-telegram-bot
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.services.telegram_bot"]

  postgres:
    image: postgres:16
    container_name: sa-helper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sa_helper}
      POSTGRES_USER: ${POSTGRES_USER:-sa_helper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sa_helper}
    volumes:
      - ${CONFIG_PATH:-/srv/ajaxhs/config}/sa_helper/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-sa_helper} -d $${POSTGRES_DB:-sa_helper}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ajax_network

  redis:
    image: redis:7-alpine
    container_name: sa-helper-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${CONFIG_PATH:-/srv/ajaxhs/config}/sa_helper/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ajax_network

networks:
  ajax_network:
    external: true
