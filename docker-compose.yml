services:
  sa-helper:
    build: .
    container_name: sa-helper
    restart: always
    init: true
    stop_grace_period: 60s
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-false}
      - PORT=${PORT:-8080}
      # Auth Settings
      - AUTH_HASH_SALT=${AUTH_HASH_SALT:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-admin123}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # Exam AI Settings
      - LITELLM_ENDPOINT=${LITELLM_ENDPOINT:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      # WhatsApp Alerts (Optional)
      - CALLMEBOT_PHONE=${CALLMEBOT_PHONE:-}
      - CALLMEBOT_APIKEY=${CALLMEBOT_APIKEY:-}
      # Paths (Internal)
      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=backend/config/config.yaml
    volumes:
      - ./backend/logs:/app/backend/logs
      - ./backend/models:/app/backend/models
      - ./backend/app/data:/app/backend/app/data
    ports:
      - "${PORT:-8080}:8080"
