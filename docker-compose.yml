services:
  api:
    image: ghcr.io/jack101a/sa-helper:latest
    container_name: sa-helper-api
    restart: unless-stopped
    init: true
    stop_grace_period: 60s
    depends_on:
      - redis
      - postgres
    expose:
      - "8080"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-true}
      - PORT=8080
      # Auth Settings
      - AUTH_HASH_SALT=${AUTH_HASH_SALT:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # Exam AI Settings
      - LITELLM_ENDPOINT=${LITELLM_ENDPOINT:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - QUEUE_WORKERS=${QUEUE_WORKERS:-4}
      - EXAM_OCR_CONCURRENCY=${EXAM_OCR_CONCURRENCY:-2}
      # WhatsApp Alerts (Optional)
      - CALLMEBOT_PHONE=${CALLMEBOT_PHONE:-}
      - CALLMEBOT_APIKEY=${CALLMEBOT_APIKEY:-}
      # Telegram Bot (optional; DB/admin token is also supported)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-}
      # Scaling Architecture (Phase 10)
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # Default to PostgreSQL for production multi-user deployments.
      - DB_TYPE=${DB_TYPE:-postgresql}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://sa_helper:sa_helper@postgres:5432/sa_helper}
      # Paths (Internal)
      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - sa_helper_logs:/app/backend/logs
      - sa_helper_data:/app/data
      - sa_helper_config:/app/backend/config

  worker:
    image: ghcr.io/jack101a/sa-helper:latest
    container_name: sa-helper-worker
    restart: unless-stopped
    init: true
    depends_on:
      - redis
      - postgres
    command:
      - celery
      - -A
      - app.workers.celery_app.celery_app
      - worker
      - --loglevel=INFO
      - --concurrency=${WORKER_CONCURRENCY:-2}
      - -Q
      - solve-heavy,feedback,maintenance,default
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-true}
      - AUTH_HASH_SALT=${AUTH_HASH_SALT:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - LITELLM_ENDPOINT=${LITELLM_ENDPOINT:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # Default to PostgreSQL for production multi-user deployments.
      - DB_TYPE=${DB_TYPE:-postgresql}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://sa_helper:sa_helper@postgres:5432/sa_helper}
      - QUEUE_WORKERS=${QUEUE_WORKERS:-4}
      - EXAM_OCR_CONCURRENCY=${EXAM_OCR_CONCURRENCY:-2}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-}
      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - sa_helper_logs:/app/backend/logs
      - sa_helper_data:/app/data
      - sa_helper_config:/app/backend/config

  nginx:
    image: nginx:1.27-alpine
    container_name: sa-helper-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8088:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  telegram-bot:
    image: ghcr.io/jack101a/sa-helper:latest
    container_name: sa-helper-telegram-bot
    restart: unless-stopped
    init: true
    depends_on:
      - api
      - redis
      - postgres
    command: ["python", "-m", "app.services.telegram_bot"]
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-true}
      - AUTH_HASH_SALT=${AUTH_HASH_SALT:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # Default to PostgreSQL for production multi-user deployments.
      - DB_TYPE=${DB_TYPE:-postgresql}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://sa_helper:sa_helper@postgres:5432/sa_helper}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-}
      - TELEGRAM_BOT_WAIT_FOR_TOKEN=${TELEGRAM_BOT_WAIT_FOR_TOKEN:-true}
      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - sa_helper_logs:/app/backend/logs
      - sa_helper_data:/app/data
      - sa_helper_config:/app/backend/config

  postgres:
    image: postgres:16
    container_name: sa-helper-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sa_helper}
      - POSTGRES_USER=${POSTGRES_USER:-sa_helper}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sa_helper}
    volumes:
      - sa_helper_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sa_helper} -d ${POSTGRES_DB:-sa_helper}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sa-helper-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - sa_helper_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sa_helper_logs:
  sa_helper_data:
  sa_helper_config:
  sa_helper_postgres:
  sa_helper_redis:
