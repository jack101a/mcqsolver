services:
  api:
    image: ${SA_HELPER_IMAGE:-ghcr.io/jack101a/sa-helper:docker-32}
    container_name: sa-helper
    restart: unless-stopped
    init: true
    stop_grace_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      CONFIG_PATH: /app/backend/config/config.yaml
      SEED_BUNDLE_ON_START: ${SEED_BUNDLE_ON_START:-true}
      SEED_IMPORT_MODE: ${SEED_IMPORT_MODE:-if-empty}
      SEED_BUNDLE_PATH: /app/import/sa-helper-seed.zip
    volumes:
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/logs:/app/backend/logs
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/data:/app/data
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/config:/app/backend/config
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/import:/app/import
    networks:
      ajax_network:
        ipv4_address: 172.60.0.63

  worker:
    image: ${SA_HELPER_IMAGE:-ghcr.io/jack101a/sa-helper:docker-32}
    container_name: sa-helper-worker
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - celery
      - -A
      - app.workers.celery_app.celery_app
      - worker
      - --loglevel=INFO
      - --concurrency=${WORKER_CONCURRENCY:-2}
      - -Q
      - solve-heavy,feedback,maintenance,default
    environment:
      CONFIG_PATH: /app/backend/config/config.yaml
      SEED_BUNDLE_ON_START: ${SEED_BUNDLE_ON_START:-true}
      SEED_IMPORT_MODE: ${SEED_IMPORT_MODE:-if-empty}
      SEED_BUNDLE_PATH: /app/import/sa-helper-seed.zip
    volumes:
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/logs:/app/backend/logs
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/data:/app/data
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/config:/app/backend/config
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/import:/app/import
    networks:
      - ajax_network

  telegram-bot:
    image: ${SA_HELPER_IMAGE:-ghcr.io/jack101a/sa-helper:docker-32}
    container_name: sa-helper-telegram-bot
    restart: unless-stopped
    init: true
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      telegram-bot-api:
        condition: service_started
    command: ["python", "-m", "app.services.telegram_bot"]
    environment:
      CONFIG_PATH: /app/backend/config/config.yaml
      SEED_BUNDLE_ON_START: ${SEED_BUNDLE_ON_START:-true}
      SEED_IMPORT_MODE: ${SEED_IMPORT_MODE:-if-empty}
      SEED_BUNDLE_PATH: /app/import/sa-helper-seed.zip
    volumes:
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/logs:/app/backend/logs
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/data:/app/data
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/config:/app/backend/config
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/import:/app/import
    networks:
      - ajax_network

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: sa-helper-telegram-bot-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?Set TELEGRAM_API_ID in .env}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?Set TELEGRAM_API_HASH in .env}
    command:
      - --local
      - --http-port=8081
      - --dir=/var/lib/telegram-bot-api
      - --temp-dir=/tmp/telegram-bot-api
    volumes:
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/telegram-bot-api:/var/lib/telegram-bot-api
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/telegram-bot-api-tmp:/tmp/telegram-bot-api
    networks:
      - ajax_network

  postgres:
    image: postgres:16
    container_name: sa-helper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sa_helper}
      POSTGRES_USER: ${POSTGRES_USER:-sa_helper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-sa_helper} -d $${POSTGRES_DB:-sa_helper}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ajax_network

  redis:
    image: redis:7-alpine
    container_name: sa-helper-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${SA_HELPER_HOST_ROOT:-/srv/ajaxhs/config}/sa_helper/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ajax_network

networks:
  ajax_network:
    external: true
