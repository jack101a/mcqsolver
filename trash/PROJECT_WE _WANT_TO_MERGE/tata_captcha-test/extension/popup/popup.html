<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tata-captcha Popup</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121826;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --panel: rgba(255,255,255,.08);
      --panel-border: rgba(255,255,255,.1);
      --field: rgba(17,24,39,.55);
      --field-border: rgba(255,255,255,.12);
      --btn: #6366f1;
      --btn-hover: #4f46e5;
      --ghost: rgba(255,255,255,.07);
      --ghost-hover: rgba(255,255,255,.13);
    }

    html[data-theme="light"] {
      color-scheme: light;
      --bg: #f8fafc;
      --fg: #0f172a;
      --muted: #64748b;
      --panel: rgba(255,255,255,.95);
      --panel-border: rgba(15,23,42,.12);
      --field: rgba(255,255,255,.95);
      --field-border: rgba(15,23,42,.15);
      --btn: #4f46e5;
      --btn-hover: #4338ca;
      --ghost: rgba(15,23,42,.06);
      --ghost-hover: rgba(15,23,42,.12);
    }

    html, body {
      background: transparent !important;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 330px;
      min-height: 430px;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--fg);
      background: transparent;
      transition: .25s ease;
    }

    .wrap { padding: 0; display: flex; flex-direction: column; min-height: 430px; }
    .shell {
      position: relative;
      border-radius: 18px;
      border: 1px solid color-mix(in srgb, var(--panel-border) 70%, transparent);
      background: var(--bg);
      box-shadow: 0 18px 28px rgba(2,6,23,.22);
      padding: 9px;
      min-height: 430px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 10% 10%, rgba(99,102,241,.24), transparent 35%),
                  radial-gradient(circle at 95% 90%, rgba(6,182,212,.18), transparent 40%);
      pointer-events: none;
      z-index: 0;
    }
    .shell > * {
      position: relative;
      z-index: 1;
    }
    .head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .brand { display: flex; align-items: center; gap: 9px; font-weight: 700; }
    .logo { width: 24px; height: 24px; border-radius: 6px; object-fit: cover; }

    .head-actions { display: flex; gap: 6px; }
    .icon-btn {
      border: 1px solid var(--panel-border);
      background: var(--ghost);
      color: var(--fg);
      border-radius: 9px;
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: .9rem;
      line-height: 1;
    }
    .icon-btn:hover { background: var(--ghost-hover); }

    .panel {
      background: var(--panel);
      border: 1px solid color-mix(in srgb, var(--panel-border) 55%, transparent);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 16px rgba(2,6,23,.14);
      padding: 9px;
      margin-bottom: 8px;
    }

    .status-bar { display: flex; gap: 8px; align-items: center; font-size: .73rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 12px rgba(239,68,68,.55); }
    .dot.on { background: #10b981; box-shadow: 0 0 12px rgba(16,185,129,.55); }

    .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
    .toggle-row span { font-size: .82rem; }

    .switch { position: relative; width: 36px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #64748b; border-radius: 20px; cursor: pointer; transition: .2s ease; }
    .slider:before { content: ""; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; border-radius: 50%; background: #fff; transition: .2s ease; }
    .switch input:checked + .slider { background: #6366f1; }
    .switch input:checked + .slider:before { transform: translateX(16px); }

    .field-label { display: block; font-size: .66rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 8px 0 4px; font-weight: 600; }
    .field-input, select {
      width: 100%; border-radius: 9px; border: 1px solid var(--field-border);
      background: var(--field); color: var(--fg); font-size: .75rem; padding: 7px 9px;
      outline: none;
    }
    .field-input:focus, select:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,.2); }

    .row { display: flex; gap: 6px; }
    .row .field-input { flex: 1; }

    .btn {
      width: 100%; border-radius: 9px; border: 1px solid transparent; cursor: pointer;
      padding: 8px 10px; font-size: .76rem; font-weight: 600; transition: .2s ease;
    }
    .btn-primary { background: var(--btn); color: #fff; }
    .btn-primary:hover { background: var(--btn-hover); }
    .btn-ghost { background: var(--ghost); border-color: var(--panel-border); color: var(--fg); }
    .btn-ghost:hover { background: var(--ghost-hover); }

    .mini { width: auto; padding: 7px 9px; }
    .footer { margin-top: auto; }
    .sync-strip {
      margin-top: auto;
      border-radius: 10px;
      border: 1px solid color-mix(in srgb, var(--panel-border) 45%, transparent);
      background: color-mix(in srgb, var(--panel) 70%, transparent);
      padding: 6px;
    }
    .sync-strip .btn { padding: 7px 9px; font-size: .72rem; }
    #statusMsg { min-height: 16px; text-align: center; font-size: .68rem; color: #22c55e; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="shell">
    <header class="head">
      <div class="brand">
        <img class="logo" src="../icon48.png" alt="tata-captcha logo">
        <div>tata<span style="color:#6366f1;">captcha</span></div>
      </div>
      <div class="head-actions">
        <button id="themeToggleBtn" type="button" class="icon-btn" title="Toggle theme">
          <span id="themeIcon" aria-hidden="true">☀</span>
        </button>
        <button id="optionsBtn" type="button" class="icon-btn" title="Open settings">
          <span aria-hidden="true">⚙</span>
        </button>
      </div>
    </header>

    <section class="panel">
      <div class="status-bar">
        <div id="connDot" class="dot"></div>
        <span id="connText">Checking...</span>
      </div>
    </section>

    <section class="panel">
      <div class="toggle-row">
        <span>Master Engine Enable</span>
        <label class="switch"><input type="checkbox" id="masterToggle" checked><span class="slider"></span></label>
      </div>
    </section>

    <section class="panel">
      <label class="field-label" for="taskType">Source Type</label>
      <select id="taskType">
        <option value="image">Image</option>
        <option value="audio">Audio</option>
        <option value="text">Text</option>
      </select>

      <label class="field-label" for="locImg">Source Selector</label>
      <div class="row">
        <input id="locImg" class="field-input" type="text" placeholder="#capimg">
        <button id="locImgBtn" type="button" class="btn btn-ghost mini">Pick</button>
      </div>

      <label class="field-label" for="locInput">Decoded Target Selector</label>
      <div class="row">
        <input id="locInput" class="field-input" type="text" placeholder="#entcaptxt">
        <button id="locInputBtn" type="button" class="btn btn-ghost mini">Pick</button>
      </div>

      <button id="saveLocBtn" type="button" class="btn btn-primary" style="margin-top:10px;">Save CSS Route</button>
    </section>

    <div class="sync-strip">
      <button id="syncBtn" type="button" class="btn btn-ghost">Sync Now</button>
      <div id="statusMsg"></div>
    </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
