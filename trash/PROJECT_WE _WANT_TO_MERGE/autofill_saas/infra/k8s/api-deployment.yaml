apiVersion: apps/v1
kind: Deployment
metadata:
  name: autofill-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autofill-api
  template:
    metadata:
      labels:
        app: autofill-api
    spec:
      containers:
        - name: api
          image: autofill/api:latest
          ports:
            - containerPort: 4000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "4000"
            - name: DATA_STORE_BACKEND
              value: "postgres"
            - name: RATE_LIMIT_BACKEND
              value: "postgres"
            - name: EVENT_BUS_BACKEND
              value: "postgres"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: autofill-api-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: autofill-api-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
