# Nginx config — Two-server setup for Unified Platform
# Server A: Primary (active)
# Server B: Backup (cold standby — only used if Server A fails)
#
# This file shows ONLY the relevant server{} and upstream{} blocks.
# The http{} directives below (limit_req_zone, log_format, etc.) must be
# placed inside the http{} block in your main nginx.conf or in a file that
# is included inside http{} (e.g. /etc/nginx/conf.d/unified-platform.conf).
#
# Quick checklist before deploying:
#   1. Replace SERVER_A_IP, SERVER_B_IP, and your-server.com with real values.
#   2. Run: certbot --nginx -d your-server.com
#   3. nginx -t && systemctl reload nginx

# ── http{} block directives (place inside http{} in nginx.conf) ────────────────
#
# Rate limiting zone — MUST be defined before limit_req can reference it.
# 10 MB shared memory stores ~160 000 IP buckets; rate capped at 30 req/min.
#
#   limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
#
# If you need per-API-key rate limiting at the Nginx layer (in addition to
# the application-level limiter), use a variable extracted from the header:
#   map $http_x_api_key $api_key_zone { default $http_x_api_key; }
#   limit_req_zone $api_key_zone zone=per_key:20m rate=60r/m;
# ──────────────────────────────────────────────────────────────────────────────

upstream unified_platform {
    server SERVER_A_IP:8080;               # Primary
    server SERVER_B_IP:8080 backup;        # Standby — activated only on primary failure
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout  65s;
}

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name your-server.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-server.com;

    # SSL — replace with your cert paths (use Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/your-server.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-server.com/privkey.pem;

    # Enforce modern TLS only
    ssl_protocols       TLSv1.2 TLSv1.3;
    # Mozilla Intermediate cipher list (avoids deprecated/weak suites)
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff                                        always;
    add_header X-Frame-Options           DENY                                            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; object-src 'none';" always;

    # Request body size limit (prevent OOM from large uploads)
    client_max_body_size 10M;

    # Global IP-based rate limiting (zone defined in http{} block — see top comment)
    # Uncomment after adding limit_req_zone to the http{} block:
    # limit_req zone=api burst=10 nodelay;

    # Proxy to backend
    location / {
        proxy_pass         http://unified_platform;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout  5s;
        proxy_send_timeout    60s;
        proxy_next_upstream   error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # Health probe (no auth required — must match the /health FastAPI route)
    location /health {
        proxy_pass http://unified_platform/health;
        access_log off;
    }

    # Admin UI static assets — cache aggressively (filenames are hashed by Vite)
    location /assets/ {
        proxy_pass http://unified_platform;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must NOT be cached so browsers pick up new deploys
    location = / {
        proxy_pass http://unified_platform;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
